[workspace]
authors = ["dvl0p <245560527+dvl0p@users.noreply.github.com>"]
channels = ["conda-forge"]
name = "mvrs"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
build = { cmd = "cargo build" }
mvrs = { cmd = "cargo run", depends-on = ["build"] }

[dependencies]
rust = ">=1.96.0,<1.97"
rust-src = ">=1.96.0,<2"
rust-analyzer = ">=2026.4.27,<2027"
